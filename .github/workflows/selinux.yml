name: Build ScamsungKernel Selinux

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel Repository URL'
        required: true
      kernel_branch:
        description: 'Git branch'
        required: false
      clang_version:
        description: 'Pilih Versi Clang Compiler'
        required: true
        default: 'clang-10'
        type: choice
        options: ['clang-10', 'clang-11', 'clang-12', 'proton-clang', 'azure-clang']
      defconfig_name:
        description: 'Nama Defconfig'
        required: true
        default: 'vendor/a23_eur_open_defconfig'
      selinux_mode:
        description: 'Pilih Mode SELinux'
        required: true
        default: 'enforcing'
        type: choice
        options: ['enforcing', 'permissive']

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout WorkSpace
      uses: actions/checkout@v4

    - name: Environment Setup
      run: |
        sudo apt update && sudo apt install -y zip ccache bc cpio flex bison git python-is-python3 libc6 libc6-dev tar perl curl lz4
        
        REPO="${{ github.event.inputs.kernel_repo || 'ISI_URL_REPO_DEFAULT_DISINI' }}"
        BRANCH="${{ github.event.inputs.kernel_branch }}"
        
        if [ -z "$BRANCH" ]; then
          git clone --depth=1 --recursive "$REPO" $GITHUB_WORKSPACE/kernel_src
        else
          git clone --depth=1 -b "$BRANCH" --recursive "$REPO" $GITHUB_WORKSPACE/kernel_src
        fi
        mkdir -p $GITHUB_WORKSPACE/toolchains && cd $GITHUB_WORKSPACE/toolchains
        CHOSEN_CLANG="${{ github.event.inputs.clang_version || 'clang-10' }}"
        
        if [ "$CHOSEN_CLANG" = "proton-clang" ]; then
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
        elif [ "$CHOSEN_CLANG" = "azure-clang" ]; then
          git clone --depth=1 https://github.com/Padd3X/Azure-Clang.git clang
        else
          git clone --depth=1 -b "$CHOSEN_CLANG" https://github.com/rsuplaygrnd/toolchains.git clang
        fi
        git clone --depth=1 -b gcc https://github.com/blxyzY/toolchain.git gcc
    - name: Compile Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc/bin:$PATH"
        export ARCH=arm64 SUBARCH=arm64 OUT_DIR=$GITHUB_WORKSPACE/out USE_CCACHE=1 CCACHE_DIR=~/.cache/ccache
        export GCC_64=aarch64-linux-android- GCC_32=arm-linux-androideabi-
        
        ccache -M 5G && mkdir -p $OUT_DIR && cd $GITHUB_WORKSPACE/kernel_src
        DEFCONFIG="${{ github.event.inputs.defconfig_name || 'vendor/a23_eur_open_defconfig' }}"
        DEFCONFIG_PATH="$GITHUB_WORKSPACE/kernel_src/arch/arm64/configs/$DEFCONFIG"
        SELINUX_CHOICE="${{ github.event.inputs.selinux_mode || 'permissive' }}"
        
        if [ "$SELINUX_CHOICE" = "permissive" ]; then
          echo "Mengonfigurasi kernel ke SELinux Permissive..."
          sed -i 's/CONFIG_CMDLINE=""/CONFIG_CMDLINE="androidboot.selinux=permissive"/' "$DEFCONFIG_PATH"
          sed -i 's/# CONFIG_SECURITY_SELINUX_DEVELOP is not set/CONFIG_SECURITY_SELINUX_DEVELOP=y/' "$DEFCONFIG_PATH"
          sed -i 's/CONFIG_SECURITY_SELINUX_ALWAYS_ENFORCE=y/# CONFIG_SECURITY_SELINUX_ALWAYS_ENFORCE is not set/' "$DEFCONFIG_PATH" 2>/dev/null || true
          if grep -q "CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE" "$DEFCONFIG_PATH"; then
            sed -i 's/# CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE is not set/CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE=y/' "$DEFCONFIG_PATH"
          else
            echo "CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE=y" >> "$DEFCONFIG_PATH"
          fi
          sed -i 's/CONFIG_INTEGRITY=y/# CONFIG_INTEGRITY is not set/' "$DEFCONFIG_PATH"
          sed -i 's/CONFIG_SECURITY_DEFEX=y/# CONFIG_SECURITY_DEFEX is not set/' "$DEFCONFIG_PATH"
          sed -i 's/CONFIG_PROCA=y/# CONFIG_PROCA is not set/' "$DEFCONFIG_PATH"
          sed -i 's/CONFIG_FIVE=y/# CONFIG_FIVE is not set/' "$DEFCONFIG_PATH"
        else
          echo "Mengonfigurasi kernel ke SELinux Enforcing..."
          sed -i 's/CONFIG_CMDLINE="androidboot.selinux=permissive"/CONFIG_CMDLINE=""/' "$DEFCONFIG_PATH"
          sed -i 's/CONFIG_SECURITY_SELINUX_DEVELOP=y/# CONFIG_SECURITY_SELINUX_DEVELOP is not set/' "$DEFCONFIG_PATH"
          sed -i 's/CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE=y/# CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE is not set/' "$DEFCONFIG_PATH"
        fi
        
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- $DEFCONFIG
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CONFIG_SECTION_MISMATCH_WARN_ONLY=y CONFIG_DEBUG_SECTION_MISMATCH=y
    - name: Package Kernel
      run: |
        rm -rf $GITHUB_WORKSPACE/zip_stage && mkdir -p $GITHUB_WORKSPACE/zip_stage
        
        if [ -d "$GITHUB_WORKSPACE/ScamsungKernel" ]; then
          cp -r $GITHUB_WORKSPACE/ScamsungKernel/* $GITHUB_WORKSPACE/zip_stage/
          find $GITHUB_WORKSPACE/zip_stage/ -name "*.zip" -type f -delete
        else
          echo "ERROR: ScamsungKernel folder not found!" && exit 1
        fi
        
        if [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/Image" ]; then
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image $GITHUB_WORKSPACE/zip_stage/Image
        else
          echo "ERROR: Image file not found!" && exit 1
        fi
        
        [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/dtbo.img" ] && cp $GITHUB_WORKSPACE/out/arch/arm64/boot/dtbo.img $GITHUB_WORKSPACE/zip_stage/dtbo.img
        
        cd $GITHUB_WORKSPACE/zip_stage && zip -r9 $GITHUB_WORKSPACE/ScamsungKernel.zip ./*
        
        # Ambil versi kernel asli dan status SELinux
        cd $GITHUB_WORKSPACE/kernel_src
        KERNEL_VERSION=$(make kernelversion)
        SELINUX_MODE="${{ github.event.inputs.selinux_mode || 'permissive' }}"
        SELINUX_CAPITAL=$(echo "$SELINUX_MODE" | awk '{print toupper(substr($0,1,1))substr($0,2)}')
        echo "RELEASE_TAG=$(date +'%Y%m%d-%H%M')-$SELINUX_MODE" >> $GITHUB_ENV
        echo "LINUX_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
        echo "SELINUX_STATUS=$SELINUX_CAPITAL" >> $GITHUB_ENV
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ScamsungKernel.zip
        tag_name: "${{ env.RELEASE_TAG }}"
        name: "Scamsung Kernel v${{ env.LINUX_VERSION }} [${{ env.SELINUX_STATUS }}]"
        body: |
          ### Kernel Build Details
          - **Linux Version**: `v${{ env.LINUX_VERSION }}`
          - **SELinux Mode**: `${{ env.SELINUX_STATUS }}`
          - **Repository**: ${{ github.event.inputs.kernel_repo }}
          - **Branch**: ${{ github.event.inputs.kernel_branch || 'default-branch' }}
          - **Compiler**: ${{ github.event.inputs.clang_version }}
          - **Defconfig**: `${{ github.event.inputs.defconfig_name }}`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
