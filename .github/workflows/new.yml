name: Build Scamsung Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel Repository URL'
        required: true
        default: ''
        type: string
      kernel_branch:
        description: 'Git branch'
        required: false
        default: ''
        type: string
      clang_version:
        description: 'Select Clang Compiler Version'
        required: true
        default: 'clang-10'
        type: choice
        options:
          - 'clang-10'
          - 'clang-11'
          - 'clang-12'
          - 'proton-clang'
          - 'azure-clang'
      defconfig_name:
        description: 'Defconfig Name (e.g. vendor/a23_eur_open_defconfig)'
        required: true
        default: 'vendor/a23_eur_open_defconfig'
        type: string

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout WorkSpace
      uses: actions/checkout@v4

    - name: Download Kernel Source
      run: |
        if [ -z "${{ github.event.inputs.kernel_branch }}" ]; then
          echo "Cloning default branch from ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE/kernel_src
        else
          echo "Cloning branch ${{ github.event.inputs.kernel_branch }} from ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE/kernel_src
        fi

    - name: Install Build Dependencies
      run: |
        sudo apt update -y
        sudo apt install zip ccache bc cpio flex bison git python-is-python3 libc6 libc6-dev tar perl curl lz4 -y

    - name: Download Toolchains
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchains
        cd $GITHUB_WORKSPACE/toolchains
         
        CHOSEN_CLANG="${{ github.event.inputs.clang_version }}"
        echo "Selected Clang version: $CHOSEN_CLANG"
         
        if [ "$CHOSEN_CLANG" = "clang-10" ]; then
          echo "Downloading Clang 10..."
          git clone --depth=1 -b clang-10 https://github.com/rsuplaygrnd/toolchains.git clang_temp
          ln -s clang_temp/host/linux-x86/clang-10 clang
        elif [ "$CHOSEN_CLANG" = "clang-11" ]; then
          echo "Downloading Clang 11..."
          git clone --depth=1 -b clang-11 https://github.com/rsuplaygrnd/toolchains.git clang_temp
          ln -s clang_temp/host/linux-x86/clang-11 clang
        elif [ "$CHOSEN_CLANG" = "clang-12" ]; then
          echo "Downloading Clang 12..."
          git clone --depth=1 -b clang-12 https://github.com/rsuplaygrnd/toolchains.git clang_temp
          ln -s clang_temp/host/linux-x86/clang-12 clang
        elif [ "$CHOSEN_CLANG" = "proton-clang" ]; then
          echo "Downloading Proton Clang..."
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
        elif [ "$CHOSEN_CLANG" = "azure-clang" ]; then
          echo "Downloading Azure Clang..."
          git clone --depth=1 https://github.com/Padd3X/Azure-Clang.git clang
        fi
         
        echo "Downloading GCC Reference Toolchain..."
        git clone --depth=1 -b gcc https://github.com/blxyzY/toolchain.git gcc_temp
         
        # KOREKSI DISINI: Memastikan folder bin dari GCC terhubung dengan benar ke $GITHUB_WORKSPACE/toolchains/gcc/bin
        if [[ "$CHOSEN_CLANG" == *"clang-"* ]]; then
          mkdir -p gcc
          ln -s $GITHUB_WORKSPACE/toolchains/gcc_temp/linux-x86/aarch64/aarch64-linux-android-4.9/bin $GITHUB_WORKSPACE/toolchains/gcc/bin
        else
          # Jika menggunakan Proton / Azure Clang, mereka biasanya butuh GCC standar di folder bin
          mkdir -p gcc
          ln -s $GITHUB_WORKSPACE/toolchains/gcc_temp/bin $GITHUB_WORKSPACE/toolchains/gcc/bin
        fi

        # Verifikasi apakah binari GCC memang ada di lokasi tersebut (untuk mempermudah debugging di log)
        echo "Isi dari folder gcc/bin:"
        ls -l gcc/bin/ || echo "Folder gcc/bin kosong atau symlink rusak!"
        
    - name: Compile Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc/bin:$PATH"
        
        export ARCH=arm64
        export SUBARCH=arm64
        export OUT_DIR=$GITHUB_WORKSPACE/out
        
        export GCC_64=aarch64-linux-android-
        export GCC_32=arm-linux-androideabi-
        
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=$GCC_64
        export CROSS_COMPILE_ARM32=$GCC_32
        
        export USE_CCACHE=1
        export CCACHE_DIR=~/.cache/ccache
        ccache -M 2G
        
        mkdir -p $OUT_DIR
        cd $GITHUB_WORKSPACE/kernel_src
        
        DEFCONFIG="${{ github.event.inputs.defconfig_name }}"
        echo "Using Defconfig: $DEFCONFIG"
        
        # Tambahkan LLVM_IAS=1 di akhir perintah make untuk mengatasi error '-EL'
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM_IAS=1 $DEFCONFIG
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LLVM_IAS=1
    - name: Package Kernel
      run: |
        echo "Preparing AnyKernel structure without duplicate files..."
        rm -rf $GITHUB_WORKSPACE/zip_stage
        mkdir -p $GITHUB_WORKSPACE/zip_stage
        
        if [ -d "$GITHUB_WORKSPACE/ScamsungKernel" ]; then
          cp -r $GITHUB_WORKSPACE/ScamsungKernel/* $GITHUB_WORKSPACE/zip_stage/
          find $GITHUB_WORKSPACE/zip_stage/ -name "*.zip" -type f -delete
        else
          echo "ERROR: ScamsungKernel folder not found!"
          exit 1
        fi
        
        if [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/Image" ]; then
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image $GITHUB_WORKSPACE/zip_stage/Image
          echo "Successfully added file: Image"
        else
          echo "ERROR: Image file not found! Kompilasi kernel kamu sebenarnya gagal di step sebelumnya."
          exit 1
        fi
        
        if [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/dtbo.img" ]; then
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/dtbo.img $GITHUB_WORKSPACE/zip_stage/dtbo.img
          echo "Successfully added file: dtbo.img"
        fi
        
        cd $GITHUB_WORKSPACE/zip_stage
        zip -r9 $GITHUB_WORKSPACE/ScamsungKernel.zip ./*
        echo "Single package zip successfully created."

    - name: Set Release Tag
      run: |
        echo "RELEASE_TAG=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ScamsungKernel.zip
        tag_name: "${{ env.RELEASE_TAG }}"
        name: "Scamsung Kernel Build - ${{ env.RELEASE_TAG }}"
        body: |
          ### Kernel Build Details
          - **Repository**: ${{ github.event.inputs.kernel_repo }}
          - **Branch**: ${{ github.event.inputs.kernel_branch || 'default-branch' }}
          - **Compiler**: ${{ github.event.inputs.clang_version }}
          - **Defconfig**: `${{ github.event.inputs.defconfig_name }}`
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
