name: Build Scamsung Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel Repository URL'
        required: true
        default: 'https://github.com/mrx7014/DOOMeKERNEL.git'
        type: string
      kernel_branch:
        description: 'Git branch'
        required: false
        default: 'oneui7'
        type: string
      clang_version:
        description: 'Select Clang Compiler Version'
        required: true
        default: 'proton-clang'
        type: choice
        options:
          - 'clang-10'
          - 'clang-11'
          - 'proton-clang'
          - 'azure-clang'
          - 'clang-12'
      defconfig_name:
        description: 'Defconfig Name (e.g. vendor/a23_eur_open_defconfig)'
        required: true
        default: 'vendor/a23_eur_open_defconfig'
        type: string

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout WorkSpace
      uses: actions/checkout@v4

    - name: Download Kernel Source
      run: |
        if [ -z "${{ github.event.inputs.kernel_branch }}" ]; then
          echo "Cloning default branch from ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE/kernel_src
        else
          echo "Cloning branch ${{ github.event.inputs.kernel_branch }} from ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE/kernel_src
        fi

    - name: Install Build Dependencies
      run: |
        sudo apt update -y
        sudo apt install zip ccache bc cpio flex bison git python-is-python3 libc6 libc6-dev tar perl curl lz4 -y

    - name: Download Toolchains
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        
        CHOSEN_CLANG="${{ github.event.inputs.clang_version }}"
        echo "Selected Clang version: $CHOSEN_CLANG"
        
        if [ "$CHOSEN_CLANG" = "clang-10" ]; then
          echo "Downloading Clang 10..."
          git clone --depth=1 -b clang-10 https://github.com/rsuplaygrnd/toolchains.git clang
        elif [ "$CHOSEN_CLANG" = "clang-11" ]; then
          echo "Downloading Clang 11..."
          git clone --depth=1 -b clang-11 https://github.com/rsuplaygrnd/toolchains.git clang
        elif [ "$CHOSEN_CLANG" = "clang-12" ]; then
          echo "Downloading Clang 12..."
          git clone --depth=1 -b clang-12 https://github.com/rsuplaygrnd/toolchains.git clang
        elif [ "$CHOSEN_CLANG" = "proton-clang" ]; then
          echo "Downloading Proton Clang..."
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
        elif [ "$CHOSEN_CLANG" = "azure-clang" ]; then
          echo "Downloading Azure Clang..."
          git clone --depth=1 https://github.com/Padd3X/Azure-Clang.git clang
        fi
        
        echo "Downloading GCC Reference Toolchain..."
        git clone --depth=1 -b gcc https://github.com/blxyzY/toolchain.git gcc

    - name: Compile Kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_src
        
        # Penentuan Variabel Menggunakan Jalur Absolut GITHUB_WORKSPACE
        KERNEL_DIR=$GITHUB_WORKSPACE/kernel_src
        OUT_DIR=$KERNEL_DIR/out
        GCC_64=$GITHUB_WORKSPACE/toolchain/gcc/bin/aarch64-linux-android-
        GCC_32=$GITHUB_WORKSPACE/toolchain/gcc/bin/arm-linux-androideabi-
        CLANG_PATH=$GITHUB_WORKSPACE/toolchain/clang/bin
        
        export DTC_EXT=$KERNEL_DIR/tools/dtc
        export CONFIG_BUILD_ARM64_DT_OVERLAY=y
        
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$CLANG_PATH:$PATH
        
        # Optimasi CCACHE
        export USE_CCACHE=1
        export CCACHE_DIR=~/.cache/ccache
        ccache -M 5G
        
        mkdir -p $OUT_DIR
        
        DEFCONFIG="${{ github.event.inputs.defconfig_name }}"
        echo "Menggunakan Defconfig: $DEFCONFIG"
        
        # Mulai Proses Build Bersih
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- $DEFCONFIG
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu-

    - name: Package Kernel
      run: |
        echo "=== MEMULAI PROSES PENGEMASAN KERNEL ==="
        
        # 1. Bersihkan dan siapkan folder staging
        rm -rf $GITHUB_WORKSPACE/zip_stage
        mkdir -p $GITHUB_WORKSPACE/zip_stage

        # 2. Cari folder ScamsungKernel / AnyKernel secara otomatis
        echo "Mencari direktori AnyKernel template..."
        ANYKERNEL_DIR=""
        if [ -d "$GITHUB_WORKSPACE/ScamsungKernel" ]; then
          ANYKERNEL_DIR="$GITHUB_WORKSPACE/ScamsungKernel"
        else
          # Jika tidak ada di root, cari di seluruh workspace
          ANYKERNEL_DIR=$(find $GITHUB_WORKSPACE -type d -name "ScamsungKernel" | head -n 1)
        fi

        if [ -n "$ANYKERNEL_DIR" ] && [ -d "$ANYKERNEL_DIR" ]; then
          echo "Folder AnyKernel ditemukan di: $ANYKERNEL_DIR"
          cp -r $ANYKERNEL_DIR/* $GITHUB_WORKSPACE/zip_stage/
          # Hapus sisa file zip lama di dalam folder jika ada
          find $GITHUB_WORKSPACE/zip_stage/ -name "*.zip" -type f -delete
        else
          echo "WARNING: Folder ScamsungKernel tidak ditemukan secara langsung. Membuat struktur AnyKernel mandiri..."
          # Membuat folder fallback jika template benar-benar hilang dari repo
          mkdir -p $GITHUB_WORKSPACE/zip_stage/patch
          touch $GITHUB_WORKSPACE/zip_stage/anykernel.sh
        fi

        # 3. Cari file biner hasil compile (Image) secara otomatis
        echo "Mencari berkas kernel biner (Image)..."
        IMAGE_SRC=""
        if [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/Image" ]; then
          IMAGE_SRC="$GITHUB_WORKSPACE/out/arch/arm64/boot/Image"
        else
          # Cari otomatis di seluruh folder output jika letaknya bergeser
          IMAGE_SRC=$(find $GITHUB_WORKSPACE/out/ -type f -name "Image" | head -n 1)
        fi

        if [ -n "$IMAGE_SRC" ] && [ -f "$IMAGE_SRC" ]; then
          echo "Berkas Image sukses ditemukan di: $IMAGE_SRC"
          cp $IMAGE_SRC $GITHUB_WORKSPACE/zip_stage/Image
          echo "Berhasil memasukkan berkas: Image"
        else
          echo "FATAL ERROR: Berkas kernel 'Image' tidak ditemukan! Kompilasi kernel kemungkinan besar gagal total pada step sebelumnya."
          exit 1
        fi

        # 4. Cari berkas DTBO (Opsional)
        echo "Mencari berkas dtbo.img (jika ada)..."
        DTBO_SRC=$(find $GITHUB_WORKSPACE/out/ -type f -name "dtbo.img" | head -n 1)
        if [ -n "$DTBO_SRC" ] && [ -f "$DTBO_SRC" ]; then
          cp $DTBO_SRC $GITHUB_WORKSPACE/zip_stage/dtbo.img
          echo "Berhasil memasukkan berkas: dtbo.img"
        fi

        # 5. Kompresi menjadi zip tunggal yang bersih
        echo "Membuat paket kompresi berkas ZIP..."
        cd $GITHUB_WORKSPACE/zip_stage
        zip -r9 $GITHUB_WORKSPACE/ScamsungKernel.zip ./*
        
        echo "=== PROSES PENGEMASAN SELESAI SUKSES ==="
        echo "Berkas zip berada di: $GITHUB_WORKSPACE/ScamsungKernel.zip"

    - name: Set Release Tag
      run: |
        echo "RELEASE_TAG=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ScamsungKernel.zip
        tag_name: "${{ env.RELEASE_TAG }}"
        name: "Scamsung Kernel Build - ${{ env.RELEASE_TAG }}"
        body: |
          ### Kernel Build Details
          - **Repository**: ${{ github.event.inputs.kernel_repo }}
          - **Branch**: ${{ github.event.inputs.kernel_branch || 'default-branch' }}
          - **Compiler**: ${{ github.event.inputs.clang_version }}
          - **Defconfig**: `${{ github.event.inputs.defconfig_name }}`
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
