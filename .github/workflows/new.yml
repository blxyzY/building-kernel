name: Build Scamsung Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel Repo URL'
        required: true
      kernel_branch:
        description: 'Branch'
        required: false
      clang_version:
        description: 'Clang'
        required: true
        default: 'clang-10'
        type: choice
        options: ['clang-10', 'clang-11', 'clang-12', 'proton-clang', 'azure-clang']
      defconfig_name:
        description: 'Defconfig'
        required: true
        default: 'vendor/a23_eur_open_defconfig'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-${{ github.event.inputs.clang_version }}-${{ github.sha }}
        restore-keys: ${{ runner.os }}-ccache-${{ github.event.inputs.clang_version }}-

    - name: Setup Environment & Toolchains
      run: |
        sudo apt update && sudo apt install rsync bc cpio flex bison aptitude aria2 git python-is-python3 tar perl wget curl lz4 ccache -y
        sudo aptitude install libssl-dev -y
        
        # Clone Kernel Source (Mendukung manual & otomatis via push)
        REPO="${{ github.event.inputs.kernel_repo || 'UR_DEFAULT_REPO_HERE' }}"
        BRANCH="${{ github.event.inputs.kernel_branch }}"
        BRANCH_ARG=${BRANCH:+"-b $BRANCH"}
        git clone --depth=1 $BRANCH_ARG --recursive $REPO $GITHUB_WORKSPACE/kernel_src

        # Download Toolchains secara dinamis
        mkdir -p toolchains && cd toolchains
        CLANG_VER="${{ github.event.inputs.clang_version || 'clang-10' }}"
        
        if [[ "$CLANG_VER" == *"proton"* ]]; then
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
        elif [[ "$CLANG_VER" == *"azure"* ]]; then
          git clone --depth=1 https://github.com/Padd3X/Azure-Clang.git clang
        else
          git clone --depth=1 -b $CLANG_VER --single-branch https://github.com/rsuplaygrnd/toolchains.git clang
        fi
        git clone --depth=1 -b gcc --single-branch https://github.com/blxyzY/toolchain.git gcc

    - name: Compile Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc/bin:$PATH"
        export ARCH=arm64 SUBARCH=arm64 OUT_DIR=$GITHUB_WORKSPACE/out USE_CCACHE=1 CCACHE_DIR=~/.cache/ccache
        export GCC_64=aarch64-linux-android- GCC_32=arm-linux-androideabi-
        
        ccache -M 5G && mkdir -p $OUT_DIR && cd $GITHUB_WORKSPACE/kernel_src
        DEFCONFIG="${{ github.event.inputs.defconfig_name || 'vendor/a23_eur_open_defconfig' }}"
        
        make O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- $DEFCONFIG olddefconfig
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CONFIG_SECTION_MISMATCH_WARN_ONLY=y

    - name: Package & Release
      run: |
        mkdir -p zip_stage
        if [ -d "ScamsungKernel" ]; then
          cp -r ScamsungKernel/* zip_stage/ && find zip_stage/ -name "*.zip" -delete
        else
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git zip_stage && rm -rf zip_stage/.git
        fi
        
        [ -f "out/arch/arm64/boot/Image" ] && cp out/arch/arm64/boot/Image zip_stage/Image || { echo "Image missing!"; exit 1; }
        [ -f "out/arch/arm64/boot/dtbo.img" ] && cp out/arch/arm64/boot/dtbo.img zip_stage/dtbo.img
        
        cd zip_stage && zip -r9 ../ScamsungKernel.zip ./*
        echo "RELEASE_TAG=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        files: ScamsungKernel.zip
        tag_name: "${{ env.RELEASE_TAG }}"
        name: "Scamsung Kernel [${{ env.RELEASE_TAG }}]"
        body: "Compiled successfully with ${{ github.event.inputs.clang_version || 'clang-10' }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
