name: Build Scamsung Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel Repository URL'
        required: true
        default: 'https://github.com/mrx7014/DOOMeKERNEL.git'
        type: string
      kernel_branch:
        description: 'Git branch'
        required: false
        default: 'oneui7'
        type: string

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengkloning Repositori Kernel secara Manual
    - name: Download Kernel Source
      run: |
        if [ -z "${{ github.event.inputs.kernel_branch }}" ]; then
          echo "Cloning default branch dari ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE
        else
          echo "Cloning branch ${{ github.event.inputs.kernel_branch }} dari ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE
        fi

    # 2. Install Dependencies Sistem Ubuntu (Ditambahkan 'zip' untuk kompresi)
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache flex libelf-dev libssl-dev libncurses-dev kmod libgmp-dev libmpc-dev sysstat
        sudo apt-get install -y lib32z1-dev liblz4-tool lzma liblzma-dev zstd zip

    # 3. Download Toolchains (GCC & Clang)
    - name: Download Toolchains
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchains
        cd $GITHUB_WORKSPACE/toolchains
        
        # Clone Clang-10 dari branch 'clang-10'
        echo "Downloading Clang 10..."
        git clone --depth=1 -b clang-10 https://github.com/rsuplaygrnd/toolchains.git clang
        
        # Clone GCC dari branch 'gcc'
        echo "Downloading GCC..."
        git clone --depth=1 -b gcc https://github.com/blxyzY/toolchain.git gcc

    # 4. Jalankan Proses Kompilasi Kernel
    - name: Compile Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc/bin:$PATH"
        
        export ARCH=arm64
        export SUBARCH=arm64
        export OUT_DIR=$GITHUB_WORKSPACE/out
        export KERNEL_DIR=$GITHUB_WORKSPACE
        
        export GCC_64=aarch64-linux-android-
        export GCC_32=arm-linux-androideabi-
        
        export USE_CCACHE=1
        export CCACHE_DIR=~/.cache/ccache
        ccache -M 5G
        
        mkdir -p $OUT_DIR
        
        # 1. Generate Defconfig
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- vendor/a23_eur_open_defconfig
        
        # 2. Build Kernel
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu-
        
        # 3. Copy Output ke Struktur Folder Kernel
        mkdir -p $KERNEL_DIR/arch/arm64/boot
        cp $OUT_DIR/arch/arm64/boot/Image $KERNEL_DIR/arch/arm64/boot/Image
        
        if [ -f $OUT_DIR/arch/arm64/boot/Image.gz ]; then
          cp $OUT_DIR/arch/arm64/boot/Image.gz $KERNEL_DIR/arch/arm64/boot/Image.gz
        else
          cp $OUT_DIR/arch/arm64/boot/Image $KERNEL_DIR/arch/arm64/boot/Image.gz
        fi

    # 5. Kompresi Hasil Build dan Unggah ke Gofile
    - name: Upload to Gofile
      run: |
        echo "Mempersiapkan berkas untuk diunggah..."
        mkdir -p $GITHUB_WORKSPACE/gofile_upload
        
        # Menyalin file-file penting yang berhasil di-build ke satu tempat
        [ -f $GITHUB_WORKSPACE/out/arch/arm64/boot/Image ] && cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image $GITHUB_WORKSPACE/gofile_upload/
        [ -f $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.gz ] && cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.gz $GITHUB_WORKSPACE/gofile_upload/
        [ -f $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.gz-dtb ] && cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.gz-dtb $GITHUB_WORKSPACE/gofile_upload/
        [ -f $GITHUB_WORKSPACE/out/arch/arm64/boot/dtbo.img ] && cp $GITHUB_WORKSPACE/out/arch/arm64/boot/dtbo.img $GITHUB_WORKSPACE/gofile_upload/
        
        # Jika ada file zip dari anykernel, masukkan juga
        cp $GITHUB_WORKSPACE/anykernel/*.zip $GITHUB_WORKSPACE/gofile_upload/ 2>/dev/null || true
        
        # Lakukan kompresi menjadi satu file tunggal
        cd $GITHUB_WORKSPACE/gofile_upload
        zip -r $GITHUB_WORKSPACE/ScamsungKernel-Build.zip .
        
        # Proses Upload menggunakan API Gofile
        echo "Mengunggah berkas ke Gofile..."
        
        # 1. Mendapatkan server Gofile yang tersedia saat ini
        SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name' 2>/dev/null || echo "store1")
        
        # 2. Eksekusi unggah file zip
        RESPONSE=$(curl -F "file=@$GITHUB_WORKSPACE/ScamsungKernel-Build.zip" "https://${SERVER}.gofile.io/contents/uploadfile")
        
        # 3. Memunculkan link download di log GitHub Actions
        DOWNLOAD_LINK=$(echo $RESPONSE | jq -r '.data.downloadPage')
        
        echo "======================================================="
        echo "BERHASIL DIUNGGAH!"
        echo "Silakan unduh kernel kamu di sini:"
        echo "$DOWNLOAD_LINK"
        echo "======================================================="

    # 6. Tetap Unggah ke Artifact Bawaan GitHub (Sebagai cadangan)
    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScamsungKernel-Custom-Build
        path: |
          out/arch/arm64/boot/Image
          out/arch/arm64/boot/Image.gz
          out/arch/arm64/boot/Image.gz-dtb
          out/arch/arm64/boot/dtbo.img
          arch/arm64/boot/Image
          arch/arm64/boot/Image.gz
          anykernel/*.zip
