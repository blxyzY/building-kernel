name: Build Scamsung Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel Repository URL'
        required: true
        default: ''
        type: string
      kernel_branch:
        description: 'Git branch'
        required: false
        default: ''
        type: string
      clang_version:
        description: 'Select Clang Compiler Version'
        required: true
        default: 'clang-10'
        type: choice
        options:
          - 'clang-10'
          - 'clang-11'
          - 'proton-clang'
          - 'azure-clang'
      defconfig_name:
        description: 'Defconfig Name (e.g. vendor/a23_eur_open_defconfig)'
        required: true
        default: 'vendor/a23_eur_open_defconfig'
        type: string
      selinux_mode:
        description: 'Select SELinux Mode'
        required: true
        default: 'Enforcing'
        type: choice
        options:
          - 'Enforcing'
          - 'Permissive'

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 1. Checkout Your Main Repository (building-kernel)
    - name: Checkout WorkSpace
      uses: actions/checkout@v4

    # 2. Clone the Kernel Source Repository into a separated folder
    - name: Download Kernel Source
      run: |
        if [ -z "${{ github.event.inputs.kernel_branch }}" ]; then
          echo "Cloning default branch from ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE/kernel_src
        else
          echo "Cloning branch ${{ github.event.inputs.kernel_branch }} from ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE/kernel_src
        fi

    # 3. Install Ubuntu System Dependencies
    - name: Install Build Dependencies
      run: |
        sudo apt update -y
        sudo apt install zip ccache -y
        sudo apt install bc cpio flex bison git python-is-python3 libc6 libc6-dev tar perl curl lz4 -y

    # 4. Download Toolchains (GCC & Clang based on choice)
    - name: Download Toolchains
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchains
        cd $GITHUB_WORKSPACE/toolchains
        
        CHOSEN_CLANG="${{ github.event.inputs.clang_version }}"
        echo "Selected Clang version: $CHOSEN_CLANG"
        
        if [ "$CHOSEN_CLANG" = "clang-10" ]; then
          echo "Downloading Clang 10..."
          git clone --depth=1 -b clang-10 https://github.com/rsuplaygrnd/toolchains.git clang
        elif [ "$CHOSEN_CLANG" = "clang-11" ]; then
          echo "Downloading Clang 11..."
          git clone --depth=1 -b clang-11 https://github.com/rsuplaygrnd/toolchains.git clang
        elif [ "$CHOSEN_CLANG" = "proton-clang" ]; then
          echo "Downloading Proton Clang (Latest)..."
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
        elif [ "$CHOSEN_CLANG" = "azure-clang" ]; then
          echo "Downloading Azure Clang..."
          git clone --depth=1 https://github.com/Padd3X/Azure-Clang.git clang
        fi
        
        echo "Downloading GCC..."
        git clone --depth=1 -b gcc https://github.com/blxyzY/toolchain.git gcc

    # 5. Execute Kernel Compilation & SELinux Setup
    - name: Compile Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc/bin:$PATH"
        
        export ARCH=arm64
        export SUBARCH=arm64
        export OUT_DIR=$GITHUB_WORKSPACE/out
        
        export GCC_64=aarch64-linux-android-
        export GCC_32=arm-linux-androideabi-
        
        export USE_CCACHE=1
        export CCACHE_DIR=~/.cache/ccache
        ccache -M 5G
        
        mkdir -p $OUT_DIR
        cd $GITHUB_WORKSPACE/kernel_src
        
        # =====================================================================
        # --- FIX KODE MAKEFILE (HOTFIX ERROR ENDIF & MISSING SEPARATOR) ---
        echo "=== Applying Hotfixes to Makefile ==="
        
        # 1. Fix extraneous 'endif' (Menonaktifkan endif yang kehilangan pasangan)
        sed -i 's/endif\t# skip-makefile/# endif\t# skip-makefile/g' Makefile
        
        # 2. Fix missing separator pada baris 812 (Memaksa spasi awal menjadi Tab)
        sed -i '812s/^[[:space:]]\+/	/' Makefile
        
        echo "=== Hotfixes Applied Successfully ==="
        # =====================================================================
        
        DEFCONFIG="${{ github.event.inputs.defconfig_name }}"
        echo "Using Defconfig: $DEFCONFIG"
        
        # SELinux Logic based on user input (Local Patching)
        if [ "${{ github.event.inputs.selinux_mode }}" = "Permissive" ]; then
          echo "Configuring SELinux to Permissive via local patching..."
          
          # Force the selinux_enforcing function to always return 0 (false/permissive)
          if [ -f "security/selinux/ss/services.c" ]; then
            sed -i 's/int selinux_enforcing/int selinux_enforcing = 0;\nint _selinux_enforcing_backup/g' security/selinux/ss/services.c
            echo "Patch for security/selinux/ss/services.c successfully applied."
          elif [ -f "security/selinux/hooks.c" ]; then
            sed -i 's/int selinux_enforcing/int selinux_enforcing = 0;\nint _selinux_enforcing_backup/g' security/selinux/hooks.c
            echo "Patch for security/selinux/hooks.c successfully applied."
          fi
          
          echo "CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE=y" >> arch/arm64/configs/$DEFCONFIG
          export SELINUX_STATE="Permissive"
        else
          echo "Configuring SELinux to Enforcing (Default)..."
          export SELINUX_STATE="Enforcing"
        fi
        
        # Start Make process
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- $
