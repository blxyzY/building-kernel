name: Build ScamsungKernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel Repository URL'
        required: true
        default: 'https://github.com/mrx7014/DOOMeKERNEL.git'
        type: string
      kernel_branch:
        description: 'Git branch'
        required: false
        default: 'oneui7'
        type: string
      clang_version:
        description: 'Pilih Versi Clang Compiler'
        required: true
        default: 'clang-10'
        type: choice
        options:
          - 'clang-10'
          - 'proton-clang'
          - 'azure-clang'
      defconfig_name:
        description: 'Nama Defconfig (e.g. vendor/a23_eur_open_defconfig)'
        required: true
        default: 'vendor/a23_eur_open_defconfig'
        type: string

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengkloning Repositori Utama Kamu (building-kernel)
    - name: Checkout WorkSpace
      uses: actions/checkout@v4

    # 2. Mengkloning Repositori Source Kernel ke folder terpisah
    - name: Download Kernel Source
      run: |
        if [ -z "${{ github.event.inputs.kernel_branch }}" ]; then
          echo "Cloning default branch dari ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE/kernel_src
        else
          echo "Cloning branch ${{ github.event.inputs.kernel_branch }} dari ${{ github.event.inputs.kernel_repo }}..."
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} --recursive ${{ github.event.inputs.kernel_repo }} $GITHUB_WORKSPACE/kernel_src
        fi

    # 3. Install Dependencies Sistem Ubuntu
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache flex libelf-dev libssl-dev libncurses-dev kmod libgmp-dev libmpc-dev sysstat
        sudo apt-get install -y lib32z1-dev liblz4-tool lzma liblzma-dev zstd zip jq

    # 4. Download Toolchains (GCC & Clang Berdasarkan Pilihan)
    - name: Download Toolchains
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchains
        cd $GITHUB_WORKSPACE/toolchains
        
        CHOSEN_CLANG="${{ github.event.inputs.clang_version }}"
        echo "Versi Clang yang dipilih: $CHOSEN_CLANG"
        
        if [ "$CHOSEN_CLANG" = "clang-10" ]; then
          echo "Downloading Clang 10..."
          git clone --depth=1 -b clang-10 https://github.com/rsuplaygrnd/toolchains.git clang
        elif [ "$CHOSEN_CLANG" = "proton-clang" ]; then
          echo "Downloading Proton Clang (Latest)..."
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
        elif [ "$CHOSEN_CLANG" = "azure-clang" ]; then
          echo "Downloading Azure Clang..."
          git clone --depth=1 https://github.com/Padd3X/Azure-Clang.git clang
        fi
        
        echo "Downloading GCC..."
        git clone --depth=1 -b gcc https://github.com/blxyzY/toolchain.git gcc

    # 5. Jalankan Proses Kompilasi Kernel
    - name: Compile Kernel
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gcc/bin:$PATH"
        
        export ARCH=arm64
        export SUBARCH=arm64
        export OUT_DIR=$GITHUB_WORKSPACE/out
        
        export GCC_64=aarch64-linux-android-
        export GCC_32=arm-linux-androideabi-
        
        export USE_CCACHE=1
        export CCACHE_DIR=~/.cache/ccache
        ccache -M 5G
        
        mkdir -p $OUT_DIR
        
        # Pindah ke direktori sumber kernel
        cd $GITHUB_WORKSPACE/kernel_src
        
        DEFCONFIG="${{ github.event.inputs.defconfig_name }}"
        echo "Menggunakan Defconfig: $DEFCONFIG"
        
        # 1. Generate Defconfig
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- $DEFCONFIG
        
        # 2. Build Kernel
        make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=$GCC_64 CROSS_COMPILE_ARM32=$GCC_32 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CONFIG_SECTION_MISMATCH_WARN_ONLY=y

    # 6. Memasukkan Hasil Kernel ke dalam Folder ScamsungKernel milikmu (Disesuaikan)
    - name: Package with AnyKernel3
      run: |
        echo "Mempersiapkan struktur AnyKernel3 dari folder ScamsungKernel..."
        
        # Menggunakan nama folder ScamsungKernel sesuai di github kamu
        if [ -d "$GITHUB_WORKSPACE/ScamsungKernel" ]; then
          cp -r $GITHUB_WORKSPACE/ScamsungKernel $GITHUB_WORKSPACE/anykernel_pack
        else
          echo "WARNING: Folder 'ScamsungKernel' tidak ditemukan! Membuat folder pack kosong."
          mkdir -p $GITHUB_WORKSPACE/anykernel_pack
        fi
        
        # Salin file kernel hasil kompilasi ke dalam folder pack
        if [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/Image.gz-dtb" ]; then
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.gz-dtb $GITHUB_WORKSPACE/anykernel_pack/Image.gz-dtb
          echo "Kernel berkas: Image.gz-dtb digunakan."
        elif [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/Image.gz" ]; then
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.gz $GITHUB_WORKSPACE/anykernel_pack/Image.gz
          echo "Kernel berkas: Image.gz digunakan."
        elif [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/Image" ]; then
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image $GITHUB_WORKSPACE/anykernel_pack/Image
          echo "Kernel berkas: Image digunakan."
        fi
        
        # Salin dtbo.img jika ada
        if [ -f "$GITHUB_WORKSPACE/out/arch/arm64/boot/dtbo.img" ]; then
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/dtbo.img $GITHUB_WORKSPACE/anykernel_pack/dtbo.img
          echo "dtbo.img berhasil dimasukkan."
        fi
        
        # Kompres seluruh isi folder menjadi berkas .zip siap flash
        cd $GITHUB_WORKSPACE/anykernel_pack
        zip -r9 $GITHUB_WORKSPACE/Flashable-Kernel-Build.zip *

    # 7. Mengunggah Hasil Berkas Zip AnyKernel ke Gofile
    - name: Upload to Gofile
      run: |
        echo "Mengunggah berkas siap flash ke Gofile..."
        
        SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name' 2>/dev/null || echo "store1")
        RESPONSE=$(curl -F "file=@$GITHUB_WORKSPACE/Flashable-Kernel-Build.zip" "https://${SERVER}.gofile.io/contents/uploadfile")
        DOWNLOAD_LINK=$(echo $RESPONSE | jq -r '.data.downloadPage')
        
        echo "======================================================="
        echo "BERHASIL DIUNGGAH!"
        echo "Silakan unduh flashable kernel .zip kamu di sini:"
        echo "$DOWNLOAD_LINK"
        echo "======================================================="

    # 8. Unggah ke Artifact Bawaan GitHub
    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flashable-Kernel-Zip
        path: |
          Flashable-Kernel-Build.zip
