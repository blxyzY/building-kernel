name: Run Kernel Assistant Telegram Bot

on:
  push:
    branches:
      - main
  schedule:
    # Mengaktifkan ulang otomatis setiap 5 jam (sebelum batas 6 jam GitHub Actions tercapai)
    - cron: '0 */5 * * *'
  workflow_dispatch:
    # Tombol manual run dari tab Actions GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # Batalkan sedikit sebelum 360 menit (6 jam) agar penutupan rapi

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Mempercepat loading install library di run berikutnya

    - name: Install Required Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot google-genai

    - name: Start Interactive Telegram Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Menjalankan script bot utama Anda
        python bot.py
