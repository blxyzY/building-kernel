name: Server Ubuntu 24 Jam (Self-Hosted)

on:
  workflow_dispatch: # Jalankan manual dari tab Actions

jobs:
  run-server-24h:
    runs-on: self-hosted # Menggunakan komputer kamu sendiri sebagai servernya

    steps:
    - name: Nyalakan Jalur SSH Realtime
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
