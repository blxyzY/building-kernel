name: Telegram AI Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    # Memicu bot otomatis setiap 5 jam agar tidak terkena limit timeout 6 jam GitHub
    - cron: '0 */5 * * *'
  workflow_dispatch: {} # Mengizinkan Anda menyalakan bot secara manual dari tombol di GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest # Menjalankan bot di server Linux Ubuntu gratis milik GitHub

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # Mengambil kode dari repositori Anda

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Menginstal Python versi 3.10

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}   # Memasukkan secret ke env script
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python bot_ai.py
        
